services:
  whatsapp-bot:
    image: ghcr.io/akinsira/whatsapp-bot:latest
    container_name: whatsapp-bot
    user: root
    restart: unless-stopped
    stop_grace_period: 10s
    volumes:
      # Persist auth session (prevents re-scanning QR on restart)
      - ./auth_info_baileys:/app/auth_info_baileys
      # Persist config and settings
      - ./config.json:/app/config.json
      - ./group_settings.json:/app/group_settings.json
      # Persist chat files (generated by !extractchat command)
      - ./cleaned_messages.txt:/app/cleaned_messages.txt
      - ./whatsapp_chat.txt:/app/whatsapp_chat.txt
      # Persist sent jobs tracker
      - ./sent_jobs.json:/app/sent_jobs.json
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"
    healthcheck:
      test: ["CMD", "pgrep", "-x", "node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
